# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# H2 Database Configuration (local dev fallback only)
spring.h2.console.enabled=false

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging Configuration
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.springframework=ERROR
logging.level.com.rewixxcloudapp=INFO

# Server port (Railway assigns PORT env var)
server.port=${PORT:8080}

# Google OAuth (from env var)
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:767706837458-rojt1v571j0gickcr434q05kad64tbtf.apps.googleusercontent.com}

# JWT (from env vars)
jwt.secret=${JWT_SECRET:change-me-secret-key-please-change-in-prod}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}


